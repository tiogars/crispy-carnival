services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      FILM_LIBRARY_ROOT: /data/films
    volumes:
      - ./server/data/films:/data/films:ro
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api
    volumes:
      - ./nginx.proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    restart: unless-stopped

  mkdocs:
    image: ghcr.io/tiogars/mkdocs-docker-image:latest
    profiles: ["docs"]
    volumes:
      - ./docs:/server/docs
      - ./mkdocs.yml:/server/mkdocs.yml
      - ./site_output:/server/site_output
    working_dir: /server/
    command: ["serve", "--dev-addr=0.0.0.0:8000"]
    ports:
      - "8000:8000"

  frontend-dev:
    profiles: ["dev"]
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm dev --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
      - frontend_pnpm_store:/root/.local/share/pnpm/store
    restart: unless-stopped

  api-dev:
    profiles: ["dev"]
    build:
      context: ./server
      dockerfile: Dockerfile
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    environment:
      FILM_LIBRARY_ROOT: /data/films
    volumes:
      - ./server/app:/app/app
      - ./server/data/films:/data/films:ro
    restart: unless-stopped

  proxy-dev:
    profiles: ["dev"]
    image: nginx:1.27-alpine
    depends_on:
      - frontend-dev
      - api-dev
    volumes:
      - ./nginx.proxy.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  frontend_node_modules:
  frontend_pnpm_store: