name: crispy-carnival-dev

services:
  frontend:
    image: node:22-alpine
    working_dir: /workspace
    init: true
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm preview --host 0.0.0.0 --port 5173 --strictPort"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
      - frontend_pnpm_store:/root/.local/share/pnpm/store
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net'); const socket=net.connect(5173, '127.0.0.1'); socket.setTimeout(3000); socket.on('connect', () => { socket.end(); process.exit(0); }); socket.on('timeout', () => { socket.destroy(); process.exit(1); }); socket.on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    init: true
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    environment:
      FILM_LIBRARY_ROOT: /data/films
    volumes:
      - ./server/app:/app/app
      - ./server/data/films:/data/films
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  proxy:
    image: nginx:stable-alpine
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./proxy/nginx.proxy.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    restart: unless-stopped

  mkdocs:
    image: ghcr.io/tiogars/mkdocs-docker-image:latest
    profiles: ["docs"]
    volumes:
      - ./docs:/server/docs
      - ./docs/settings/mkdocs.yml:/server/mkdocs.yml
      - ./site_output:/server/site_output
    working_dir: /server/
    command: ["serve", "--dev-addr=0.0.0.0:8000"]
    ports:
      - "8000:8000"

volumes:
  frontend_node_modules:
  frontend_pnpm_store:
