name: crispy-carnival-local

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    environment:
      FILM_LIBRARY_ROOT: /data/films
    volumes:
      - ./server/app:/app/app
      - ./server/data/films:/data/films
    restart: unless-stopped

  proxy:
    image: localhost:5000/crispy-carnival-proxy:latest
    depends_on:
      - frontend
      - api
    ports:
      - "3000:80"
    restart: unless-stopped

  mkdocs:
    image: ghcr.io/tiogars/mkdocs-docker-image:latest
    profiles: ["docs"]
    volumes:
      - ./docs:/server/docs
      - ./docs/settings/mkdocs.yml:/server/mkdocs.yml
      - ./site_output:/server/site_output
    working_dir: /server/
    command: ["serve", "--dev-addr=0.0.0.0:8000"]
    ports:
      - "8000:8000"
