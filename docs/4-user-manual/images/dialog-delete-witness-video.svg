<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" font-family="Inter, Segoe UI, sans-serif">
  <!-- Dim overlay -->
  <rect width="460" height="260" fill="rgba(0,0,0,0.48)"/>

  <!-- Dialog box -->
  <rect x="60" y="40" width="340" height="188" rx="12" fill="#ffffff" filter="drop-shadow(0 8px 32px rgba(0,0,0,0.22))"/>

  <!-- Dialog title -->
  <text x="84" y="78" font-size="16" font-weight="600" fill="#1a2a3a">Confirm witness video deletion</text>
  <line x1="60" y1="90" x2="400" y2="90" stroke="#e0e7ef" stroke-width="1"/>

  <!-- Message -->
  <text x="84" y="122" font-size="13" fill="#1a2a3a">Delete witness video</text>
  <text x="84" y="142" font-size="13" font-weight="600" fill="#b71c1c">"witness_20240312.mp4"</text>
  <text x="84" y="162" font-size="13" fill="#1a2a3a">?</text>

  <!-- Action row -->
  <line x1="60" y1="176" x2="400" y2="176" stroke="#e0e7ef" stroke-width="1"/>
  <rect x="230" y="188" width="70" height="30" rx="6" fill="none" stroke="#c6ced8" stroke-width="1"/>
  <text x="265" y="208" font-size="13" fill="#546e7a" text-anchor="middle">Cancel</text>
  <rect x="310" y="188" width="70" height="30" rx="6" fill="#b71c1c"/>
  <text x="345" y="208" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Delete</text>
</svg>
