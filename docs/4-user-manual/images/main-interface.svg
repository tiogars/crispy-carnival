<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" font-family="Inter, Segoe UI, sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="100%" stop-color="#dfe5eb"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="680" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1100" height="90" fill="none"/>
  <text x="20" y="30" font-size="11" font-weight="700" fill="#546e7a" letter-spacing="1.2">FILM SEQUENCE FINDER</text>
  <text x="20" y="58" font-size="26" font-weight="700" fill="#1a2a3a">Original Reel Sequence Finder</text>
  <text x="20" y="80" font-size="13" fill="#455a64">Choose a film, inspect its original reels, and preview every scanned image frame.</text>

  <!-- Header nav links -->
  <rect x="760" y="18" width="140" height="32" rx="16" fill="rgba(255,255,255,0.72)" stroke="rgba(13,71,161,0.18)" stroke-width="1"/>
  <text x="830" y="39" font-size="12" font-weight="700" fill="#0d47a1" text-anchor="middle">Open documentation</text>

  <rect x="912" y="18" width="130" height="32" rx="16" fill="rgba(255,255,255,0.72)" stroke="rgba(13,71,161,0.18)" stroke-width="1"/>
  <text x="977" y="39" font-size="12" font-weight="700" fill="#0d47a1" text-anchor="middle">⬡ GitHub repository</text>

  <rect x="1053" y="18" width="30" height="32" rx="16" fill="rgba(255,255,255,0.72)" stroke="rgba(13,71,161,0.18)" stroke-width="1"/>
  <text x="1068" y="39" font-size="11" font-weight="700" fill="#0d47a1" text-anchor="middle">🐛</text>

  <!-- Left panel (selection) -->
  <rect x="16" y="98" width="310" height="400" rx="12" fill="#ffffff" filter="drop-shadow(0 4px 16px rgba(17,25,40,0.08))"/>

  <!-- Film label row -->
  <text x="32" y="132" font-size="14" font-weight="600" fill="#1a2a3a">Film</text>
  <rect x="180" y="117" width="90" height="26" rx="13" fill="#0d47a1"/>
  <text x="225" y="135" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Add film</text>
  <rect x="275" y="117" width="36" height="26" rx="13" fill="#1565c0"/>
  <text x="293" y="135" font-size="9" font-weight="600" fill="#fff" text-anchor="middle">Upload</text>

  <!-- Film select -->
  <rect x="32" y="142" width="278" height="36" rx="8" fill="#f8fbff" stroke="#c6ced8" stroke-width="1"/>
  <text x="48" y="165" font-size="13" fill="#1a2a3a">The Third Man</text>
  <text x="286" y="165" font-size="14" fill="#546e7a" text-anchor="end">▾</text>

  <!-- Reel label -->
  <text x="32" y="206" font-size="14" font-weight="600" fill="#1a2a3a">Reel Sequence</text>

  <!-- Reel select -->
  <rect x="32" y="214" width="278" height="36" rx="8" fill="#f8fbff" stroke="#c6ced8" stroke-width="1"/>
  <text x="48" y="237" font-size="13" fill="#1a2a3a">reel_001 (48 frames)</text>
  <text x="286" y="237" font-size="14" fill="#546e7a" text-anchor="end">▾</text>

  <!-- Status -->
  <text x="32" y="272" font-size="12" fill="#37474f">Loaded 48 frame(s) for playback.</text>

  <!-- Separator -->
  <line x1="32" y1="290" x2="294" y2="290" stroke="#e0e7ef" stroke-width="1"/>

  <!-- Witness video section -->
  <text x="32" y="316" font-size="14" font-weight="600" fill="#eceff1">Witness video</text>
  <!-- Witness video section on dark bg  -->
  <rect x="16" y="305" width="310" height="190" rx="0 0 12 12" fill="none"/>
  <text x="32" y="318" font-size="13" font-weight="600" fill="#546e7a">Witness video</text>
  <text x="260" y="318" font-size="11" fill="#546e7a" text-anchor="end">No direct file available.</text>
  <rect x="32" y="326" width="278" height="36" rx="8" fill="#f8fbff" stroke="#c6ced8" stroke-width="1"/>
  <text x="48" y="349" font-size="13" fill="#9aa5b1">No witness videos</text>
  <text x="286" y="349" font-size="14" fill="#546e7a" text-anchor="end">▾</text>
  <text x="32" y="384" font-size="12" fill="#546e7a">No witness video available for this film.</text>

  <!-- Right panel (preview area) -->
  <rect x="344" y="98" width="740" height="400" rx="12" fill="#101418"/>

  <!-- Player area -->
  <rect x="360" y="112" width="708" height="350" rx="8" fill="#0c0f12"/>

  <!-- Film frame placeholder -->
  <rect x="360" y="112" width="708" height="320" rx="8" fill="#151a20"/>
  <!-- Simulated film frame content -->
  <text x="714" y="280" font-size="18" fill="#4a5568" text-anchor="middle">▶ Frame 1 / 48</text>
  <text x="714" y="310" font-size="13" fill="#374151" text-anchor="middle">frame0001.png</text>

  <!-- Player controls bar -->
  <rect x="360" y="432" width="708" height="30" rx="0 0 8 8" fill="#1a1f26"/>
  <circle cx="380" cy="447" r="10" fill="#0d47a1"/>
  <text x="380" y="452" font-size="12" fill="#fff" text-anchor="middle">▶</text>
  <rect x="400" y="442" width="520" height="6" rx="3" fill="#2d3748"/>
  <rect x="400" y="442" width="40" height="6" rx="3" fill="#4a90d9"/>
  <text x="935" y="452" font-size="11" fill="#9aa5b1">0:02 / 2:00</text>

  <!-- Dimensions label -->
  <text x="714" y="476" font-size="11" fill="#4a5568" text-anchor="middle">1280 × 720 · 24 fps · loop</text>

  <!-- Footer -->
  <rect x="0" y="640" width="1100" height="40" fill="none"/>
  <text x="20" y="665" font-size="12" fill="#78909c">Film Sequence Finder</text>
  <text x="1080" y="665" font-size="12" fill="#78909c" text-anchor="end">v1.0.0</text>
</svg>
