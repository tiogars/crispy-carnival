<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" font-family="Inter, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="100%" stop-color="#dfe5eb"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="480" fill="url(#bg2)"/>

  <!-- Header -->
  <text x="20" y="28" font-size="10" font-weight="700" fill="#546e7a" letter-spacing="1.2">FILM SEQUENCE FINDER</text>
  <text x="20" y="52" font-size="22" font-weight="700" fill="#1a2a3a">Original Reel Sequence Finder</text>
  <text x="20" y="70" font-size="12" fill="#455a64">Choose a film, inspect its original reels, and preview every scanned image frame.</text>

  <!-- Left panel -->
  <rect x="16" y="86" width="300" height="380" rx="12" fill="#ffffff" filter="drop-shadow(0 4px 16px rgba(17,25,40,0.08))"/>

  <!-- Film label and actions -->
  <text x="32" y="116" font-size="13" font-weight="600" fill="#1a2a3a">Film</text>
  <rect x="170" y="103" width="82" height="24" rx="12" fill="#0d47a1"/>
  <text x="211" y="120" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Add film</text>
  <rect x="258" y="103" width="46" height="24" rx="12" fill="#1565c0"/>
  <text x="281" y="120" font-size="9" font-weight="600" fill="#fff" text-anchor="middle">Upload</text>

  <!-- Film select -->
  <rect x="32" y="128" width="268" height="34" rx="8" fill="#f8fbff" stroke="#0d47a1" stroke-width="2"/>
  <text x="46" y="150" font-size="13" fill="#1a2a3a">The Third Man</text>
  <text x="276" y="150" font-size="13" fill="#546e7a" text-anchor="end">▾</text>

  <!-- Reel label -->
  <text x="32" y="186" font-size="13" font-weight="600" fill="#1a2a3a">Reel Sequence</text>

  <!-- Reel select -->
  <rect x="32" y="194" width="268" height="34" rx="8" fill="#f8fbff" stroke="#c6ced8" stroke-width="1"/>
  <text x="46" y="216" font-size="13" fill="#1a2a3a">reel_001 (48 frames)</text>
  <text x="276" y="216" font-size="13" fill="#546e7a" text-anchor="end">▾</text>

  <!-- Status -->
  <text x="32" y="250" font-size="12" fill="#37474f">Loaded 48 frame(s) for playback.</text>

  <!-- Witness video -->
  <line x1="32" y1="268" x2="284" y2="268" stroke="#e0e7ef" stroke-width="1"/>
  <text x="32" y="292" font-size="13" font-weight="600" fill="#546e7a">Witness video</text>
  <text x="284" y="292" font-size="11" fill="#90caf9" text-anchor="end">Open direct file</text>
  <rect x="32" y="302" width="268" height="34" rx="8" fill="#f8fbff" stroke="#c6ced8" stroke-width="1"/>
  <text x="46" y="324" font-size="12" fill="#1a2a3a">witness_20240312.mp4</text>
  <!-- video element placeholder -->
  <rect x="32" y="346" width="268" height="110" rx="10" fill="#000"/>
  <text x="166" y="408" font-size="12" fill="#4a5568" text-anchor="middle">▶  witness_20240312.mp4</text>

  <!-- Right panel (preview) -->
  <rect x="336" y="86" width="748" height="380" rx="12" fill="#101418"/>
  <!-- Player -->
  <rect x="352" y="100" width="716" height="320" rx="8" fill="#151a20"/>
  <text x="710" y="268" font-size="22" fill="#4a5568" text-anchor="middle">◀◀  ▶  ▶▶</text>
  <text x="710" y="300" font-size="14" fill="#374151" text-anchor="middle">frame0001.png  ·  48 frames</text>

  <!-- Controls -->
  <rect x="352" y="420" width="716" height="28" rx="0 0 8 8" fill="#1a1f26"/>
  <circle cx="370" cy="434" r="9" fill="#0d47a1"/>
  <text x="370" y="439" font-size="11" fill="#fff" text-anchor="middle">▶</text>
  <rect x="388" y="430" width="560" height="5" rx="2.5" fill="#2d3748"/>
  <rect x="388" y="430" width="45" height="5" rx="2.5" fill="#4a90d9"/>
  <text x="958" y="438" font-size="10" fill="#9aa5b1">0:02 / 2:00</text>
  <text x="710" y="464" font-size="10" fill="#4a5568" text-anchor="middle">1280 × 720  ·  24 fps  ·  loop</text>
</svg>
