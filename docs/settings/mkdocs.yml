site_name: Film Sequence Finder
site_description: Film reel sequence discovery and visualization platform.
site_url: https://tiogars.github.io/crispy-carnival/
repo_url: https://github.com/tiogars/crispy-carnival
repo_name: tiogars/crispy-carnival

edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site_output

nav:
  - Home: index.md
  - Overview:
      - Overview: 0-overview/index.md
      - README Guide: 0-overview/0.1-readme-guide/index.md
  - Specification:
      - Overview: 1-specification/index.md
      - Film Sequence Finder:
          - Overview: 1-specification/1.1-film-sequence-finder/index.md
          - Functional Specification: 1-specification/1.1-film-sequence-finder/1.1.1-functional-specification/index.md
          - Video Sequence Segmentation: 1-specification/1.1-film-sequence-finder/1.1.1-functional-specification/1.1.1.1-video-sequence-segmentation/index.md
          - Data and Persistence: 1-specification/1.1-film-sequence-finder/1.1.2-data-and-persistence/index.md
          - User Experience: 1-specification/1.1-film-sequence-finder/1.1.3-user-experience/index.md
          - Sequence Extraction Settings Page: 1-specification/1.1-film-sequence-finder/1.1.3-user-experience/1.1.3.1-sequence-extraction-settings-page/index.md
          - Technical Stack: 1-specification/1.1-film-sequence-finder/1.1.4-technical-stack/index.md
          - Technical Methodology: 1-specification/1.1-film-sequence-finder/1.1.5-technical-methodology/index.md
          - Coding Conventions: 1-specification/1.1-film-sequence-finder/1.1.6-coding-conventions/index.md
          - Acceptance Criteria: 1-specification/1.1-film-sequence-finder/1.1.7-acceptance-criteria/index.md
  - Delivery:
      - Overview: 2-delivery/index.md
      - Film Sequence Finder Implementation Plan:
          - Overview: 2-delivery/2.1-film-sequence-finder-implementation-plan/index.md
          - Target Architecture: 2-delivery/2.1-film-sequence-finder-implementation-plan/2.1.1-target-architecture/index.md
          - Implementation Phases: 2-delivery/2.1-film-sequence-finder-implementation-plan/2.1.2-implementation-phases/index.md
          - Work Breakdown: 2-delivery/2.1-film-sequence-finder-implementation-plan/2.1.3-work-breakdown/index.md
          - Testing Plan: 2-delivery/2.1-film-sequence-finder-implementation-plan/2.1.4-testing-plan/index.md
          - Delivery Milestones: 2-delivery/2.1-film-sequence-finder-implementation-plan/2.1.5-delivery-milestones/index.md
      - Docker Deployment: 2-delivery/2.2-docker-deployment/index.md
  - Review:
      - Overview: 3-review/index.md
      - Implementation Status: 3-review/3.1-implementation-status/index.md
      - Open Points: 3-review/3.2-open-points/index.md
  - User Manual:
      - Overview: 4-user-manual/index.md
      - Film Browser: 4-user-manual/4.1-film-browser/index.md
      - API Operations: 4-user-manual/4.2-api-operations/index.md
      - Film Management: 4-user-manual/4.3-film-management/index.md
      - Witness Video Management: 4-user-manual/4.4-witness-video-management/index.md
      - Sequence Extraction Settings: 4-user-manual/4.4-witness-video-management/4.4.1-sequence-extraction-settings/index.md

theme:
  custom_dir: docs/settings/overrides
  favicon: settings/assets/images/favicon.png
  icon:
    repo: fontawesome/brands/github
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tiogars/crispy-carnival
      name: GitHub Repository
    - icon: fontawesome/solid/bug
      link: https://github.com/tiogars/crispy-carnival/issues/new
      name: Create an Issue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
